<!DOCTYPE html>
<html>

<head>
    <title>eBay Lite</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>eBay Lite</h1>
    </header>

    <div class="container">
        <h2 class="page-title">Welcome to eBay Lite</h2>
        <p class="page-subtitle">Login or create an account to continue.</p>

        <div class="auth-actions">
            <button id="showLoginBtn" type="button">Login</button>
            <button id="showCreateBtn" type="button">Create Account</button>
        </div>

        <div id="loginBlock" class="auth-block hidden">
            <h3>Login</h3>
            <form id="loginForm">
                <input id="loginUsername" type="text" name="loginUsername" placeholder="Username" required>
                <input id="loginPassword" type="password" name="loginPassword" placeholder="Password" required>
                <button type="submit">Continue</button>
            </form>
        </div>

        <div id="createBlock" class="auth-block hidden">
            <h3>Create Account</h3>
            <form id="signupForm">
                <input id="createUsername" type="text" name="createUsername" placeholder="Username" required>
                <input id="createPassword" type="password" name="createPassword" placeholder="Password" required>
                <button type="submit">Continue</button>
            </form>
        </div>

        <p id="authMessage"></p>
    </div>

    <script src="auth.js"></script>

</body>

</html>
