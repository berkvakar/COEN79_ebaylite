<!DOCTYPE html>
<html>

<head>
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>eBay Lite</h1>

        <nav class="tab-nav">
            <a class="tab-link" href="/marketplace.html">Listings</a>
            <a class="tab-link active" href="/profile.html">Profile</a>
        </nav>
    </header>

    <div class="container">

        <h2>User Profile</h2>
        <h3 id="userName">Demo User</h3>
        <h3>Create Listing</h3>
        <form id="createListingForm" class="listing-form">
            <input id="listingName" type="text" placeholder="Item name" required>
            <input id="listingDescription" type="text" placeholder="Description" required>
            <input id="listingPrice" type="number" min="0.01" step="0.01" placeholder="Buy now price" required>
            <label for="listingExpireDate">Expire date</label>
            <input id="listingExpireDate" type="date" required>
            <label for="listingAddHours">Expire hour</label>
            <select id="listingAddHours" required>
                <option value="0">12AM</option>
                <option value="1">1AM</option>
                <option value="2">2AM</option>
                <option value="3">3AM</option>
                <option value="4">4AM</option>
                <option value="5">5AM</option>
                <option value="6">6AM</option>
                <option value="7">7AM</option>
                <option value="8">8AM</option>
                <option value="9">9AM</option>
                <option value="10">10AM</option>
                <option value="11">11AM</option>
                <option value="12">12PM</option>
                <option value="13">1PM</option>
                <option value="14">2PM</option>
                <option value="15">3PM</option>
                <option value="16">4PM</option>
                <option value="17">5PM</option>
                <option value="18">6PM</option>
                <option value="19">7PM</option>
                <option value="20">8PM</option>
                <option value="21">9PM</option>
                <option value="22">10PM</option>
                <option value="23">11PM</option>
            </select>
            <div class="listing-form-actions">
                <button type="submit">Create</button>
                <button id="cancelCreateListingBtn" type="button" class="danger-btn">Cancel</button>
            </div>
        </form>

        <h3>Watchlist</h3>
        <ul id="watchlist"></ul>

        <h3>Auction History</h3>
        <ul id="history"></ul>

        <h3>Sold Items</h3>
        <ul id="sold"></ul>

        <h3>Bids</h3>
        <ul id="bids"></ul>

        <div class="profile-actions">
            <button type="button" class="signout-btn">Sign Out</button>
            <button type="button" class="delete-account-btn danger-btn">Delete Account</button>
        </div>
        <p id="profileActionMessage"></p>

    </div>
    <button id="printLogsBtn" type="button" class="print-logs-btn">Print Logs</button>

    <script src="profile.js"></script>
    <script src="auth.js"></script>

</body>

</html>
